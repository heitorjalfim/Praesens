spring.application.name=praesens

spring.datasource.url=jdbc:h2:file:./data/praesensdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

openweather.api.key=${OPENWEATHER_API_KEY}
openweather.api.url=https://api.openweathermap.org/data/2.5/weather

tomtom.api.key=${TOMTOM_API_KEY}
tomtom.api.url=https://api.tomtom.com/traffic/services/4/flowSegmentData/absolute/10/json

spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true